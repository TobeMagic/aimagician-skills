<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AImagician Skills Logo</title>
  <desc id="desc">Central skill hub connected to six CLI targets.</desc>
  <defs>
    <linearGradient id="hubLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24D4FF" />
      <stop offset="100%" stop-color="#18A5FF" />
    </linearGradient>
    <linearGradient id="hubRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA33A" />
      <stop offset="100%" stop-color="#FF6D1F" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B9F2FF" />
      <stop offset="100%" stop-color="#D9E2FF" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0A1422" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#0E1724" />
  <circle cx="256" cy="256" r="188" fill="none" stroke="url(#ring)" stroke-opacity="0.25" stroke-width="2" />
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#ring)" stroke-opacity="0.18" stroke-width="2" />

  <g stroke-linecap="round" stroke-width="10" opacity="0.9">
    <line x1="256" y1="166" x2="256" y2="82" stroke="#4FD9FF" />
    <line x1="256" y1="346" x2="256" y2="430" stroke="#4FD9FF" />
    <line x1="166" y1="256" x2="82" y2="256" stroke="#4FD9FF" />
    <line x1="346" y1="256" x2="430" y2="256" stroke="#FFA34A" />
    <line x1="192" y1="192" x2="128" y2="128" stroke="#4FD9FF" />
    <line x1="320" y1="320" x2="384" y2="384" stroke="#FFA34A" />
  </g>

  <g filter="url(#soft)">
    <polygon points="256,126 368,191 368,321 256,386 144,321 144,191" fill="#101F31" />
    <polygon points="256,126 256,386 144,321 144,191" fill="url(#hubLeft)" />
    <polygon points="256,126 256,386 368,321 368,191" fill="url(#hubRight)" />
  </g>

  <g fill="#0F2035">
    <circle cx="256" cy="82" r="16" />
    <circle cx="256" cy="430" r="16" />
    <circle cx="82" cy="256" r="16" />
    <circle cx="430" cy="256" r="16" />
    <circle cx="128" cy="128" r="16" />
    <circle cx="384" cy="384" r="16" />
  </g>

  <g fill="#BFF2FF">
    <circle cx="256" cy="82" r="8" />
    <circle cx="256" cy="430" r="8" />
    <circle cx="82" cy="256" r="8" />
    <circle cx="430" cy="256" r="8" />
    <circle cx="128" cy="128" r="8" />
    <circle cx="384" cy="384" r="8" />
  </g>

  <g fill="#F2FBFF">
    <rect x="224" y="233" width="18" height="58" rx="9" />
    <rect x="270" y="233" width="18" height="58" rx="9" />
    <rect x="224" y="213" width="64" height="14" rx="7" />
  </g>
</svg>
