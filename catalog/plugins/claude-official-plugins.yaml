sources:
  - id: claude-official-plugins
    type: github
    enabled: true
    description: Anthropic official Claude plugins catalog
    targets:
      include:
        - claude
    github:
      repo: anthropics/claude-plugins-official
      ref: main
      path: external_plugins
    assets:
      - id: asana
        kind: plugin
        path: asana
      - id: context7
        kind: plugin
        path: context7
      - id: firebase
        kind: plugin
        path: firebase
      - id: github
        kind: plugin
        path: github
      - id: gitlab
        kind: plugin
        path: gitlab
      - id: greptile
        kind: plugin
        path: greptile
      - id: laravel-boost
        kind: plugin
        path: laravel-boost
      - id: linear
        kind: plugin
        path: linear
      - id: playwright
        kind: plugin
        path: playwright
      - id: serena
        kind: plugin
        path: serena
      - id: slack
        kind: plugin
        path: slack
      - id: stripe
        kind: plugin
        path: stripe
      - id: supabase
        kind: plugin
        path: supabase
