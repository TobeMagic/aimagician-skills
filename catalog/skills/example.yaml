sources:
  - id: claude-official
    type: github
    enabled: true
    description: Anthropic-maintained skill repository
    github:
      repo: anthropics/claude-code-skills
      ref: main
      path: skills
    assets:
      - id: gsd
        kind: skill
        path: gsd/SKILL.md
  - id: local-bootstrap
    type: command
    enabled: false
    command:
      run: npx aimagician-skills sync --source bootstrap
    assets:
      - id: bootstrap-helper
        kind: skill
